<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0A0E1A">
  <title>{{ page.title | default: site.title }}</title>
  {% if page.description or site.description %}
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% endif %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=JetBrains+Mono:wght@400;700&display=swap">
  <style>
    :root {
      --bg:           #0A0E1A;
      --surface:      #141828;
      --surface-alt:  #1E2438;
      --on-bg:        #E0E0E0;
      --on-bg-muted:  #9AA3C0;
      --cyan:         #00FFFF;
      --cyan-light:   #66FFFF;
      --cyan-subtle:  #003333;
      --magenta:      #FF00FF;
      --outline:      #2A3050;
      --max-w:        720px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--on-bg);
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 16px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Subtle radial glow behind the page */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(900px 500px at 50% -10%, rgba(0, 255, 255, 0.06), transparent 70%),
        radial-gradient(700px 400px at 90% 110%, rgba(255, 0, 255, 0.04), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .site-header,
    .content,
    .site-footer {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 24px;
    }

    .site-header {
      padding-top: 56px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--outline);
      margin-bottom: 32px;
    }

    .wordmark {
      font-family: "Orbitron", "JetBrains Mono", sans-serif;
      font-weight: 700;
      font-size: 28px;
      letter-spacing: 0.18em;
      line-height: 1;
      margin: 0 0 12px;
    }

    .wordmark .cyber  { color: var(--cyan-light); }
    .wordmark .vault  { color: var(--cyan); }

    .site-header h1 {
      font-family: "Orbitron", "JetBrains Mono", sans-serif;
      font-weight: 700;
      font-size: 40px;
      line-height: 1.1;
      letter-spacing: 0.04em;
      color: var(--on-bg);
      margin: 0 0 8px;
    }

    .site-header .updated {
      color: var(--on-bg-muted);
      font-size: 13px;
      letter-spacing: 0.04em;
      margin: 0;
    }

    .content {
      padding-bottom: 48px;
      flex: 1 0 auto;
    }

    .content h1,
    .content h2,
    .content h3 {
      font-family: "Orbitron", "JetBrains Mono", sans-serif;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--cyan);
      margin: 40px 0 12px;
    }

    /* The markdown body's leading h1 is the same as the header h1 — hide it. */
    .content > h1:first-child { display: none; }

    .content h2 {
      font-size: 22px;
      padding-left: 14px;
      border-left: 3px solid var(--cyan);
      color: var(--cyan-light);
    }

    .content h3 {
      font-size: 17px;
      color: var(--cyan-light);
    }

    .content p,
    .content li {
      margin: 0 0 14px;
    }

    .content ul,
    .content ol {
      padding-left: 22px;
      margin: 0 0 16px;
    }

    .content li::marker { color: var(--cyan); }

    .content a {
      color: var(--cyan);
      text-decoration: underline;
      text-decoration-color: rgba(0, 255, 255, 0.4);
      text-underline-offset: 3px;
    }

    .content a:hover { text-decoration-color: var(--cyan); }

    .content strong {
      color: var(--cyan-light);
      font-weight: 700;
    }

    .content code {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.92em;
      padding: 2px 6px;
      background: var(--surface);
      border: 1px solid var(--outline);
      border-radius: 4px;
      color: var(--cyan-light);
    }

    .content blockquote {
      margin: 16px 0;
      padding: 12px 16px;
      background: var(--surface);
      border-left: 3px solid var(--magenta);
      color: var(--on-bg-muted);
    }

    .content hr {
      border: 0;
      border-top: 1px solid var(--outline);
      margin: 32px 0;
    }

    .site-footer {
      flex: 0 0 auto;
      padding: 24px 0 40px;
      margin-top: 24px;
      border-top: 1px solid var(--outline);
      color: var(--on-bg-muted);
      font-size: 12px;
      letter-spacing: 0.04em;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 18px;
      justify-content: space-between;
    }

    .site-footer .brand {
      color: var(--cyan);
      font-family: "Orbitron", "JetBrains Mono", sans-serif;
      letter-spacing: 0.18em;
    }

    @media (max-width: 540px) {
      .site-header { padding-top: 36px; }
      .site-header h1 { font-size: 30px; }
      .wordmark { font-size: 22px; }
      .content h2 { font-size: 19px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <p class="wordmark"><span class="cyber">CYBER</span> <span class="vault">VAULT</span></p>
    <h1>Privacy Policy</h1>
    <p class="updated">Last updated: 2026-05-05</p>
  </header>

  <main class="content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <span class="brand">CYBER VAULT</span>
    <span>Android &middot; portfolio tracker &middot; local-first</span>
  </footer>
</body>
</html>
